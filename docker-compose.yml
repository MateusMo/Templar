services:

  # ── Load Balancer ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

  # ── API instance 1 ─────────────────────────────────────────────────
  api1:
    build: .
    expose:
      - "8080"
    environment:
      - TEMPLAR_PORT=8080
      - TEMPLAR_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  # ── API instance 2 ─────────────────────────────────────────────────
  api2:
    build: .
    expose:
      - "8080"
    environment:
      - TEMPLAR_PORT=8080
      - TEMPLAR_THREADS=2
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

# Total: 0.10 + 0.45 + 0.45 = 1.00 CPU | 30 + 160 + 160 = 350 MB ✓

networks:
  default:
    driver: bridge