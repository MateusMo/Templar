worker_processes 1;
worker_rlimit_nofile 65536;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log  /dev/null crit;

    sendfile   on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    upstream templar_api {
        server api1:8080;
        server api2:8080;
        keepalive 128;
    }

    server {
        listen 9999;

        location / {
            proxy_pass         http://templar_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 10s;
            proxy_send_timeout 10s;
        }
    }
}